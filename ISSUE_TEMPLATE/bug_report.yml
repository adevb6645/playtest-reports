name: Bug report
description: Log a bug found during playtesting
title: "[BUG] "
labels: ["status:open"]
body:
  - type: dropdown
    id: game
    attributes:
      label: Game
      options:
        - Crater Command
        - Adrift
        - Other indie title
    validations:
      required: true

  - type: input
    id: other-game-name
    attributes:
      label: If "Other indie title", name it here
      placeholder: e.g. Hollow Knight, a demo on itch.io, etc.
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this affect the player experience?
      options:
        - High - breaks the game or blocks progress
        - Medium - noticeable, workaround exists
        - Low - cosmetic or minor annoyance
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Bug type
      options:
        - Logic - game behaves incorrectly
        - Visual - rendering, UI, animation
        - Audio - sound or music issue
        - Performance - lag, crash, freeze
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug
      placeholder: The fuel gauge does not update after collecting a refuel pickup.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so someone else can recreate this exactly
      placeholder: |
        1. Start a new match
        2. Collect a fuel pickup
        3. Look at the HUD fuel value
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The fuel gauge should increase by the pickup amount.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The fuel gauge stays the same even though fuel was collected.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Platform, browser, build/version if known
      placeholder: Chrome on Windows 11, Crater Command build from June 20
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or video
      description: Drag and drop images or clips directly into this box
    validations:
      required: false
