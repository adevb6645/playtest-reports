name: Bug Report
description: File a bug found during playtesting
title: "[BUG] "
labels: []
body:
  - type: input
    id: game
    attributes:
      label: Game / Build
      description: Which game and build/version was this found in?
      placeholder: "e.g. Crater Command v0.4"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
      placeholder: "What went wrong?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps so someone else can hit the same bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Result
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Result
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: After submitting, apply the matching severity:* label to this issue.
      options:
        - High (breaks the game or blocks progress)
        - Medium (noticeable, workaround exists)
        - Low (cosmetic or minor annoyance)
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Bug Type
      description: A bug can be more than one type. After submitting, apply all matching type:* labels to this issue.
      multiple: true
      options:
        - Logic (game behaves incorrectly)
        - Visual (rendering, UI, animation)
        - Audio (sound or music issue)
        - Performance (lag, crash, freeze)
        - Other (does not fit the above)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser (if applicable), device, anything relevant.
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Screenshots, logs, anything else useful.
    validations:
      required: false
